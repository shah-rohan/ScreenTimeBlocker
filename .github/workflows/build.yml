name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install XcodeGen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      run: xcodegen generate
    
    - name: Build App
      run: |
        xcodebuild clean archive \
          -project ScreenTimeBlocker.xcodeproj \
          -scheme ScreenTimeBlocker \
          -configuration Debug \
          -archivePath $PWD/build/ScreenTimeBlocker.xcarchive \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Export IPA
      run: |
        mkdir Payload
        cp -r build/ScreenTimeBlocker.xcarchive/Products/Applications/ScreenTimeBlocker.app Payload/
        zip -r ScreenTimeBlocker.ipa Payload
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScreenTimeBlocker
        path: ScreenTimeBlocker.ipa