name: ScreenTimeBlocker

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: 16.0

targets:
  ScreenTimeBlocker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ScreenTimeBlocker
        excludes:
          - "*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.ScreenTimeBlocker
        INFOPLIST_FILE: ScreenTimeBlocker/Info.plist
        CODE_SIGN_ENTITLEMENTS: ScreenTimeBlocker.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.9"
    entitlements:
      path: ScreenTimeBlocker.entitlements